// ─── Job Board ────────────────────────────────────────────────────────────────
function JobBoard({ role }) {
  const [search, setSearch] = useState('');

  const cats = ['All','Cruise Ship','Band','Concert/Festival','Stable','Movie Project','Live Recording'];

    const ms = j.title.toLowerCase().includes(search.toLowerCase())||j.instruments.some(i=>i.toLowerCase().includes(search.toLowerCase()));
    const mc = cat==='All'||j.cat===cat;
    return ms&&mc;
  });
  return (
    <div className="p-6 lg:p-10 space-y-8 slide-in">
      <div className="p-8 rounded-3xl text-white relative overflow-hidden" style={{background:PURPLE}}>
        <div className="relative z-10 max-w-lg">
          <div className="inline-flex items-center gap-2 rounded-full px-3 py-1 text-xs font-black uppercase tracking-widest mb-4" style={{background:GOLD,color:PURPLE}}>💼 Live Opportunities</div>
          <h1 className="text-3xl font-black mb-2">Find Your Next Gig</h1>
          <p className="text-white/70 text-sm">Cruise ships, concerts, studios, and more.</p>
        </div>
        <div className="absolute -bottom-6 -right-6 text-8xl opacity-5">💼</div>
      </div>
      <div className="relative">
        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by title, instrument, location..." className="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-gray-100 border border-gray-200 text-sm focus:outline-none focus:border-purple-300" style={{fontFamily:'Inter'}}/>
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} className="flex-shrink-0 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all" style={cat===c?{background:PURPLE,color:'white',boxShadow:`0 4px 12px rgba(82,45,128,0.3)`}:{background:'#f4f4f4',color:'#666'}}>{c}</button>
        ))}
      </div>
      <p className="text-xs font-black uppercase tracking-widest text-gray-400">{filtered.length} opportunities</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {filtered.map(job=>{
          const isApplied = applied.includes(job.id);
          return (
            <div key={job.id} className="bg-white border-2 rounded-2xl overflow-hidden transition-all hover:shadow-lg hover:-translate-y-0.5 cursor-pointer" style={{borderColor:'rgba(82,45,128,0.08)'}}>
              <div className="p-5">
                <div className="flex items-start justify-between gap-3 mb-4">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg bg-gray-100">{job.cat==='Cruise Ship'?'🚢':job.cat==='Band'?'🎸':job.cat==='Concert/Festival'?'🎤':job.cat==='Stable'?'🏨':job.cat==='Movie Project'?'🎬':job.cat==='Live Recording'?'🎙️':'🎵'}</div>
                    <div>
                      <p className="text-xs font-black uppercase tracking-widest text-gray-400">{job.client}</p>
                      <span className={`text-xs font-black uppercase tracking-widest px-2 py-0.5 rounded-full ${CAT_COLORS[job.cat]||'bg-gray-100 text-gray-700'}`}>{job.cat}</span>
                    </div>
                  </div>
                  {isApplied&&<span className="bg-green-100 text-green-700 text-xs font-black uppercase tracking-widest px-2 py-1 rounded-full">Applied</span>}
                </div>
                <h3 className="font-black text-sm leading-tight mb-3">{job.title}</h3>
                <div className="grid grid-cols-2 gap-2 mb-3">
                  <span className="text-xs text-gray-400">📍 {job.loc.split(',')[0]}</span>
                  <span className="text-xs text-gray-400">💰 {job.rate}</span>
                  <span className="text-xs text-gray-400">📅 {job.date}</span>
                  <span className="text-xs text-gray-400">👥 {job.applicants} applicants</span>
                </div>
                <div className="flex items-center justify-between">
                  <div className="flex gap-1">{job.instruments.slice(0,2).map(i=><span key={i} className="text-xs font-black px-2 py-1 rounded-lg" style={{background:'#f8f4ff',color:PURPLE}}>{i}</span>)}</div>
                  <button onClick={()=>!isApplied&&setApplied(p=>[...p,job.id])} className="text-xs font-black px-4 py-2 rounded-xl transition-all" style={isApplied?{background:'#f0fdf4',color:'#16a34a'}:{background:PURPLE,color:'white',boxShadow:`0 4px 8px rgba(82,45,128,0.3)`}}>
                    {isApplied?'✓ Applied':'Apply'}
                  </button>
                </div>
              </div>
              <div className="px-5 py-3 flex items-center justify-between" style={{background:'rgba(244,244,244,0.5)'}}>
                <span className="text-xs text-gray-400">Level {job.lvl}+ required</span>
                <span className="text-xs font-black uppercase tracking-widest text-gray-400">{job.slots} slot{job.slots>1?'s':''}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [role, setRole]           = useState(null);
  const [view, setView]           = useState('home');
  const [showLogin, setShowLogin] = useState(true);

  const handleLogin = (r) => { setRole(r); setShowLogin(false); };

  const renderContent = () => {
    if (!role) return null;
    switch(view) {
      case 'home':
        if (role==='musician')     return <MusicianDashboard setView={setView}/>;
        if (role==='agency_admin') return <AdminDashboard setView={setView}/>;
        if (role==='client')       return <GuestExplore setView={setView} setShowLogin={setShowLogin}/>;
        return <GuestExplore setView={setView} setShowLogin={setShowLogin}/>;
      case 'job-board': case 'job-listings': return <JobBoard role={role}/>;
      case 'musicians': case 'talent-roster': return <TalentRoster isClient={role==='client'||role==='guest'}/>;
      case 'onboarding': return <OnboardingFlow/>;
      case 'my-applications': return <SimpleView title="My Applications" emoji="📋" sub="Your gig applications and status"/>;
      case 'my-bookings': case 'bookings-manage': return <SimpleView title="Bookings" emoji="📖" sub="Confirmed gigs and upcoming engagements"/>;
      case 'earnings': case 'payments': return <SimpleView title="Earnings" emoji="💰" sub="Track your income from gigs"/>;
      case 'messages': return <SimpleView title="Messages" emoji="💬" sub="Your booking conversations"/>;
      case 'profile': return <SimpleView title="My Profile" emoji="👤" sub="Your musician portfolio and credentials"/>;
      case 'applications-queue': return <SimpleView title="Applications Queue" emoji="📋" sub="Review and act on musician applications"/>;
      case 'client-directory': return <SimpleView title="Client Directory" emoji="🌐" sub="Registered clients and promoters"/>;
      case 'my-requests': return <SimpleView title="My Requests" emoji="📋" sub="Gigs you've posted or requested"/>;
      case 'settings': return <SimpleView title="Settings" emoji="⚙️" sub="Account preferences and security"/>;
      default: return <GuestExplore setView={setView} setShowLogin={setShowLogin}/>;
    }
  };

  return (
    <div className="min-h-screen bg-white">
      {showLogin && <LoginScreen onLogin={handleLogin}/>}
      {role && (
        <>
          <Navbar role={role} view={view} setView={setView} setShowLogin={setShowLogin}/>
          <div className="flex max-w-7xl mx-auto">
            <Sidebar role={role} view={view} setView={setView} setShowLogin={setShowLogin}/>
            <main className="flex-1 min-w-0 pb-20">
              {renderContent()}
            </main>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
